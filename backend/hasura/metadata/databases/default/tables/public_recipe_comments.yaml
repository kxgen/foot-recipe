table:
  name: recipe_comments
  schema: public
object_relationships:
  - name: recipe
    using:
      foreign_key_constraint_on: recipe_id
  - name: recipe_comment
    using:
      foreign_key_constraint_on: parent_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: recipe_comments
    using:
      foreign_key_constraint_on:
        column: parent_id
        table:
          name: recipe_comments
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-user-id
      columns:
        - recipe_id
        - parent_id
        - body
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - user_id
        - recipe_id
        - parent_id
        - body
        - created_at
        - updated_at
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - id
        - user_id
        - recipe_id
        - parent_id
        - body
        - created_at
        - updated_at
      filter: {}
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - body
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
