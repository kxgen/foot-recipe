table:
  name: recipes
  schema: public
object_relationships:
  - name: category
    using:
      foreign_key_constraint_on: category_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: recipe_bookmarks
    using:
      foreign_key_constraint_on:
        column: recipe_id
        table:
          name: recipe_bookmarks
          schema: public
  - name: recipe_comments
    using:
      foreign_key_constraint_on:
        column: recipe_id
        table:
          name: recipe_comments
          schema: public
  - name: recipe_images
    using:
      foreign_key_constraint_on:
        column: recipe_id
        table:
          name: recipe_images
          schema: public
  - name: recipe_ingredients
    using:
      foreign_key_constraint_on:
        column: recipe_id
        table:
          name: recipe_ingredients
          schema: public
  - name: recipe_likes
    using:
      foreign_key_constraint_on:
        column: recipe_id
        table:
          name: recipe_likes
          schema: public
  - name: recipe_purchases
    using:
      foreign_key_constraint_on:
        column: recipe_id
        table:
          name: recipe_purchases
          schema: public
  - name: recipe_ratings
    using:
      foreign_key_constraint_on:
        column: recipe_id
        table:
          name: recipe_ratings
          schema: public
  - name: recipe_steps
    using:
      foreign_key_constraint_on:
        column: recipe_id
        table:
          name: recipe_steps
          schema: public
computed_fields:
  - name: total_time_minutes
    definition:
      function:
        name: recipe_total_time
        schema: public
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-user-id
      columns:
        - category_id
        - title
        - slug
        - description
        - prep_time_minutes
        - difficulty
        - price
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - avg_rating
        - category_id
        - created_at
        - description
        - difficulty
        - id
        - prep_time_minutes
        - price
        - rating_count
        - slug
        - title
        - updated_at
        - user_id
        - like_count
      computed_fields:
        - total_time_minutes
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - avg_rating
        - category_id
        - created_at
        - description
        - difficulty
        - id
        - prep_time_minutes
        - price
        - rating_count
        - slug
        - title
        - updated_at
        - user_id
        - like_count
      computed_fields:
        - total_time_minutes
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - category_id
        - title
        - slug
        - description
        - prep_time_minutes
        - difficulty
        - price
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
